{{ define "main" }}
  <article class="container article">
    <header class="page-header">
      <p class="eyebrow">{{ .Section | humanize }}</p>
      <h1>{{ .Title }}</h1>
      {{ if .Date }}
        <p class="meta">{{ .Date.Format "Jan 2, 2006" }}</p>
      {{ end }}
      {{ with .Description }}<p class="lead">{{ . }}</p>{{ end }}
    </header>
    <div class="prose">
      {{ .Content }}
    </div>
  </article>
{{ end }}
